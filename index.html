<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>
    Bonjour,
    <span id="nomAffiche">Client</span>
  </h1>

  <div class="balance">
    <p>Montant disponible</p>

    <h2 id="soldeAffiche">
      0 FCFA
    </h2>
  </div>

  <div class="info">
    Bienvenue sur votre compte Google TV,
    vos retraits sont directement validés
    sur votre numéro de retrait ✅
  </div>

  <div class="cards">

    <div class="card">
      <p>Vues comptées</p>

      <h3 id="vuesAffiche">
        0 vues
      </h3>
    </div>

    <div class="card">
      <p>Numéro retrait</p>

      <h3 id="numeroAffiche">
        0000000000
      </h3>
    </div>

  </div>

  <button onclick="startWithdrawal()">
    💸 Demander un retrait
  </button>

  <div class="progress">
    <div id="bar"></div>
  </div>

  <p id="message"></p>

  <h2>
    Choisir votre mode de retrait
  </h2>

  <div class="modes">

    <button>Wave</button>
    <button>Tmoney</button>
    <button>Orange</button>
    <button>MTN</button>
    <button>Moov</button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
